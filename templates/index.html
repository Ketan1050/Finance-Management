<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Using Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <!-- ================= AUTH VIEW ================= -->
    <div id="auth-view" class="min-h-screen flex items-center justify-center p-4 transition-opacity duration-300">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
            <div class="flex justify-center mb-6 text-indigo-600">
                <i data-lucide="activity" class="w-12 h-12"></i>
            </div>
            <h2 id="auth-title" class="text-2xl font-bold text-center text-slate-800 mb-8">Welcome Back</h2>
            
            <div id="auth-error" class="hidden-view flex items-center gap-2 bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm font-medium">
                <i data-lucide="alert-circle" class="w-4 h-4"></i>
                <span id="auth-error-msg"></span>
            </div>

            <div id="auth-success" class="hidden-view flex items-center gap-2 bg-green-50 text-green-600 p-3 rounded-lg mb-4 text-sm font-medium">
                <i data-lucide="check-circle" class="w-4 h-4"></i>
                <span id="auth-success-msg"></span>
            </div>

            <form id="auth-form" class="space-y-4">
                <div id="username-group" class="hidden-view">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label id="email-label" class="block text-sm font-medium text-slate-700 mb-1">Email Address or Username</label>
                    <input type="text" id="email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <button type="submit" id="auth-submit" class="w-full bg-indigo-600 text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-700 transition-colors flex justify-center items-center">
                    Sign In
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-600">
                <span id="auth-toggle-text">Don't have an account? </span>
                <button type="button" id="auth-toggle-btn" class="text-indigo-600 font-semibold hover:underline">Sign up</button>
            </p>
        </div>
    </div>

    <!-- ================= DASHBOARD VIEW ================= -->
    <div id="dashboard-view" class="hidden-view min-h-screen bg-slate-50">
        <!-- Navigation -->
        <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
            <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center gap-2 text-indigo-600">
                        <i data-lucide="activity" class="w-6 h-6"></i>
                        <span class="font-bold text-xl text-slate-800">ExpenseTracker</span>
                    </div>
                    <button id="logout-btn" class="flex items-center gap-2 text-sm font-medium text-slate-600 hover:text-red-600 transition-colors">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Sign out
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="summary-cards">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div class="p-3 bg-indigo-100 text-indigo-600 rounded-xl"><i data-lucide="dollar-sign"></i></div>
                    <div>
                        <p class="text-sm text-slate-500 font-medium">Total Spent</p>
                        <p class="text-2xl font-bold text-slate-800" id="sum-total">$0.00</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div class="p-3 bg-emerald-100 text-emerald-600 rounded-xl"><i data-lucide="list"></i></div>
                    <div>
                        <p class="text-sm text-slate-500 font-medium">Transactions</p>
                        <p class="text-2xl font-bold text-slate-800" id="sum-count">0</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div class="p-3 bg-orange-100 text-orange-600 rounded-xl"><i data-lucide="pie-chart"></i></div>
                    <div class="w-full">
                        <p class="text-sm text-slate-500 font-medium mb-1">Top Category</p>
                        <p class="text-lg font-bold text-slate-800 truncate" id="sum-top-cat">N/A</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Add Expense Form -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <i data-lucide="plus" class="w-5 h-5 text-indigo-600"></i> Add Expense
                        </h3>
                        
                        <div id="expense-error" class="hidden-view flex items-center gap-2 bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm font-medium">
                            <i data-lucide="alert-circle" class="w-4 h-4"></i>
                            <span id="expense-error-msg"></span>
                        </div>

                        <form id="expense-form" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Title</label>
                                <input type="text" id="exp-title" required placeholder="e.g. Morning Coffee" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Amount ($)</label>
                                <input type="number" id="exp-amount" step="0.01" required min="0.01" placeholder="0.00" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Category</label>
                                <select id="exp-category" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm bg-white">
                                    <option value="Food">Food</option>
                                    <option value="Transport">Transport</option>
                                    <option value="Utilities">Utilities</option>
                                    <option value="Entertainment">Entertainment</option>
                                    <option value="Shopping">Shopping</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Description (Optional)</label>
                                <textarea id="exp-desc" rows="2" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm resize-none"></textarea>
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 text-white font-medium py-2.5 rounded-lg hover:bg-indigo-700 transition-colors text-sm mt-2">
                                Save Expense
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Expenses List -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                        <h3 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                            <i data-lucide="list" class="w-5 h-5 text-indigo-600"></i> Recent Transactions
                        </h3>
                        <div id="expenses-container" class="space-y-3">
                            <!-- JS will inject expenses here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Application Script -->
    <script>
        // Initialize Icons
        lucide.createIcons();

        // Constants & State
        const API_URL = window.location.origin; // Uses relative URL assuming FastAPI serves this template
        let authToken = null;
        let isLoginMode = true; 
        // templates = Jinja2Templates(directory="app/templates") 

        // DOM Elements
        const authView = document.getElementById('auth-view');
        const dashboardView = document.getElementById('dashboard-view');
        
        // Auth Elements
        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const authSubmit = document.getElementById('auth-submit');
        const usernameGroup = document.getElementById('username-group');
        const authToggleText = document.getElementById('auth-toggle-text');
        const authToggleBtn = document.getElementById('auth-toggle-btn');
        const authError = document.getElementById('auth-error');
        const authErrorMsg = document.getElementById('auth-error-msg');
        const authSuccess = document.getElementById('auth-success');
        const authSuccessMsg = document.getElementById('auth-success-msg');

        // Expense Elements
        const expenseForm = document.getElementById('expense-form');
        const expensesContainer = document.getElementById('expenses-container');
        const expenseError = document.getElementById('expense-error');
        const expenseErrorMsg = document.getElementById('expense-error-msg');

        // Toggle Auth Mode
        authToggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authError.classList.add('hidden-view');
            authSuccess.classList.add('hidden-view');
            
            if (isLoginMode) {
                authTitle.textContent = 'Welcome Back';
                authSubmit.textContent = 'Sign In';
                usernameGroup.classList.add('hidden-view');
                document.getElementById('username').removeAttribute('required');
                document.getElementById('email-label').textContent = 'Email Address or Username';
                authToggleText.textContent = "Don't have an account? ";
                authToggleBtn.textContent = 'Sign up';
            } else {
                authTitle.textContent = 'Create an Account';
                authSubmit.textContent = 'Sign Up';
                usernameGroup.classList.remove('hidden-view');
                document.getElementById('username').setAttribute('required', 'true');
                document.getElementById('email-label').textContent = 'Email Address';
                authToggleText.textContent = "Already have an account? ";
                authToggleBtn.textContent = 'Log in';
            }
        });

        // Handle Auth Submit
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            authError.classList.add('hidden-view');
            authSuccess.classList.add('hidden-view');
            authSubmit.disabled = true;
            authSubmit.textContent = 'Processing...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;

            try {
                if (isLoginMode) {
                    const formData = new URLSearchParams();
                    formData.append('username', email); // backend uses email for OAuth2 username field
                    formData.append('password', password);

                    const res = await fetch(`${API_URL}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData
                    });

                    if (res.ok) {
                        const data = await res.json();
                        authToken = data.access_token;
                        showDashboard();
                    } else {
                        let errorMsg = 'Login failed';
                        try {
                            const err = await res.json();
                            errorMsg = Array.isArray(err.detail) ? err.detail.map(e => e.msg).join(', ') : (err.detail || errorMsg);
                        } catch(e) {
                            errorMsg = `Server error: ${res.status}`;
                        }
                        throw new Error(errorMsg);
                    }
                } else {
                    const res = await fetch(`${API_URL}/signup`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, username, password })
                    });

                    if (res.ok) {
                        authSuccess.classList.remove('hidden-view');
                        authSuccessMsg.textContent = 'Account created! Please log in.';
                        authToggleBtn.click(); // Switch to login
                    } else {
                        let errorMsg = 'Signup failed';
                        try {
                            const err = await res.json();
                            errorMsg = Array.isArray(err.detail) ? err.detail.map(e => e.msg).join(', ') : (err.detail || errorMsg);
                        } catch(e) {
                            errorMsg = `Server error: ${res.status}`;
                        }
                        throw new Error(errorMsg);
                    }
                }
            } catch (err) {
                authError.classList.remove('hidden-view');
                authErrorMsg.textContent = err.message;
            } finally {
                authSubmit.disabled = false;
                authSubmit.textContent = isLoginMode ? 'Sign In' : 'Sign Up';
            }
        });

        // Dashboard Transitions
        function showDashboard() {
            authView.classList.add('hidden-view');
            dashboardView.classList.remove('hidden-view');
            fetchData();
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            authToken = null;
            authForm.reset();
            dashboardView.classList.add('hidden-view');
            authView.classList.remove('hidden-view');
        });

        // Fetch Data
        async function fetchData() {
            try {
                // Fetch Summary
                const sumRes = await fetch(`${API_URL}/expenses/summary`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (sumRes.ok) {
                    const summary = await sumRes.json();
                    document.getElementById('sum-total').textContent = `$${summary.total_spent.toFixed(2)}`;
                    document.getElementById('sum-count').textContent = summary.total_transactions;
                    
                    let topCat = 'N/A';
                    let maxVal = 0;
                    for (const [cat, val] of Object.entries(summary.category_breakdown)) {
                        if (val > maxVal) { maxVal = val; topCat = cat; }
                    }
                    document.getElementById('sum-top-cat').textContent = topCat;
                }

                // Fetch Expenses
                const expRes = await fetch(`${API_URL}/expenses`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                if (expRes.status === 401) {
                    document.getElementById('logout-btn').click();
                    return;
                }

                if (expRes.ok) {
                    const expenses = await expRes.json();
                    renderExpenses(expenses);
                }
            } catch (err) {
                console.error("Failed to load dashboard data", err);
            }
        }

        // Render Expenses
        function renderExpenses(expenses) {
            expensesContainer.innerHTML = '';
            
            if (expenses.length === 0) {
                expensesContainer.innerHTML = `
                    <div class="text-center py-12 bg-slate-50 rounded-xl border-2 border-dashed border-slate-200">
                        <p class="text-slate-500 font-medium">No expenses found.</p>
                        <p class="text-sm text-slate-400 mt-1">Add your first expense using the form.</p>
                    </div>`;
                return;
            }

            expenses.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).forEach(exp => {
                const date = new Date(exp.created_at).toLocaleDateString();
                const el = document.createElement('div');
                el.className = "group flex items-center justify-between p-4 rounded-xl border border-slate-100 hover:border-indigo-100 hover:bg-indigo-50/30 transition-all";
                el.innerHTML = `
                    <div class="flex flex-col gap-1">
                        <span class="font-semibold text-slate-800">${exp.title}</span>
                        <div class="flex items-center gap-3 text-xs text-slate-500">
                            <span class="px-2 py-0.5 bg-slate-100 rounded-md font-medium text-slate-600">${exp.category}</span>
                            <span>${date}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-800">$${exp.amount.toFixed(2)}</span>
                        <button onclick="deleteExpense('${exp.id}')" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg opacity-0 group-hover:opacity-100 transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                expensesContainer.appendChild(el);
            });
            lucide.createIcons(); // re-init icons for new DOM elements
        }

        // Handle Add Expense
        expenseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            expenseError.classList.add('hidden-view');

            const payload = {
                title: document.getElementById('exp-title').value,
                amount: parseFloat(document.getElementById('exp-amount').value),
                category: document.getElementById('exp-category').value,
                description: document.getElementById('exp-desc').value
            };

            try {
                const res = await fetch(`${API_URL}/expenses`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    expenseForm.reset();
                    fetchData(); // Refresh UI
                } else {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to add expense');
                }
            } catch (err) {
                expenseError.classList.remove('hidden-view');
                expenseErrorMsg.textContent = err.message;
            }
        });

        // Handle Delete Expense
        window.deleteExpense = async function(id) {
            try {
                const res = await fetch(`${API_URL}/expenses/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (res.ok) {
                    fetchData(); // Refresh UI
                }
            } catch (err) {
                console.error("Failed to delete expense");
            }
        };

    </script>
</body>
</html>
